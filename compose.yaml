services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    environment:
      APP_NAME: ${DOCKER_APP_NAME:-SRHR}
      APP_ENV: ${DOCKER_APP_ENV:-production}
      APP_DEBUG: ${DOCKER_APP_DEBUG:-false}
      APP_KEY: ${DOCKER_APP_KEY:-base64:6f0w1+Rj0m9V7xw+LJdF0yk4s3eh4F6o2vJ5Qf8nJPo=}
      APP_URL: ${DOCKER_APP_URL:-http://localhost}
      LOG_CHANNEL: ${DOCKER_LOG_CHANNEL:-stack}
      LOG_LEVEL: ${DOCKER_LOG_LEVEL:-info}
      DB_CONNECTION: ${DOCKER_DB_CONNECTION:-mysql}
      DB_HOST: ${DOCKER_DB_HOST:-db}
      DB_PORT: ${DOCKER_DB_PORT:-3306}
      DB_DATABASE: ${DOCKER_DB_DATABASE:-srhr}
      DB_USERNAME: ${DOCKER_DB_USERNAME:-srhr}
      DB_PASSWORD: ${DOCKER_DB_PASSWORD:-secret}
      SESSION_DRIVER: ${DOCKER_SESSION_DRIVER:-redis}
      CACHE_STORE: ${DOCKER_CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${DOCKER_QUEUE_CONNECTION:-redis}
      REDIS_HOST: ${DOCKER_REDIS_HOST:-redis}
      REDIS_PORT: ${DOCKER_REDIS_PORT:-6379}
      FILESYSTEM_DISK: ${DOCKER_FILESYSTEM_DISK:-public}
      RUN_MIGRATIONS: ${DOCKER_RUN_MIGRATIONS:-true}
      RUN_SEEDERS: ${DOCKER_RUN_SEEDERS:-false}
      CACHE_LARAVEL_CONFIG: ${DOCKER_CACHE_LARAVEL_CONFIG:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage_data:/var/www/html/storage

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "${DOCKER_WEB_PORT:-80}:80"
    volumes:
      - storage_data:/var/www/html/storage:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=90"]
    environment:
      APP_NAME: ${DOCKER_APP_NAME:-SRHR}
      APP_ENV: ${DOCKER_APP_ENV:-production}
      APP_DEBUG: ${DOCKER_APP_DEBUG:-false}
      APP_KEY: ${DOCKER_APP_KEY:-base64:6f0w1+Rj0m9V7xw+LJdF0yk4s3eh4F6o2vJ5Qf8nJPo=}
      APP_URL: ${DOCKER_APP_URL:-http://localhost}
      LOG_CHANNEL: ${DOCKER_LOG_CHANNEL:-stack}
      LOG_LEVEL: ${DOCKER_LOG_LEVEL:-info}
      DB_CONNECTION: ${DOCKER_DB_CONNECTION:-mysql}
      DB_HOST: ${DOCKER_DB_HOST:-db}
      DB_PORT: ${DOCKER_DB_PORT:-3306}
      DB_DATABASE: ${DOCKER_DB_DATABASE:-srhr}
      DB_USERNAME: ${DOCKER_DB_USERNAME:-srhr}
      DB_PASSWORD: ${DOCKER_DB_PASSWORD:-secret}
      SESSION_DRIVER: ${DOCKER_SESSION_DRIVER:-redis}
      CACHE_STORE: ${DOCKER_CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${DOCKER_QUEUE_CONNECTION:-redis}
      REDIS_HOST: ${DOCKER_REDIS_HOST:-redis}
      REDIS_PORT: ${DOCKER_REDIS_PORT:-6379}
      FILESYSTEM_DISK: ${DOCKER_FILESYSTEM_DISK:-public}
      RUN_MIGRATIONS: "false"
      RUN_SEEDERS: "false"
      CACHE_LARAVEL_CONFIG: ${DOCKER_CACHE_LARAVEL_CONFIG:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage_data:/var/www/html/storage

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    command: ["sh", "-lc", "while true; do php artisan schedule:run --no-interaction -v; sleep 60; done"]
    environment:
      APP_NAME: ${DOCKER_APP_NAME:-SRHR}
      APP_ENV: ${DOCKER_APP_ENV:-production}
      APP_DEBUG: ${DOCKER_APP_DEBUG:-false}
      APP_KEY: ${DOCKER_APP_KEY:-base64:6f0w1+Rj0m9V7xw+LJdF0yk4s3eh4F6o2vJ5Qf8nJPo=}
      APP_URL: ${DOCKER_APP_URL:-http://localhost}
      LOG_CHANNEL: ${DOCKER_LOG_CHANNEL:-stack}
      LOG_LEVEL: ${DOCKER_LOG_LEVEL:-info}
      DB_CONNECTION: ${DOCKER_DB_CONNECTION:-mysql}
      DB_HOST: ${DOCKER_DB_HOST:-db}
      DB_PORT: ${DOCKER_DB_PORT:-3306}
      DB_DATABASE: ${DOCKER_DB_DATABASE:-srhr}
      DB_USERNAME: ${DOCKER_DB_USERNAME:-srhr}
      DB_PASSWORD: ${DOCKER_DB_PASSWORD:-secret}
      SESSION_DRIVER: ${DOCKER_SESSION_DRIVER:-redis}
      CACHE_STORE: ${DOCKER_CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${DOCKER_QUEUE_CONNECTION:-redis}
      REDIS_HOST: ${DOCKER_REDIS_HOST:-redis}
      REDIS_PORT: ${DOCKER_REDIS_PORT:-6379}
      FILESYSTEM_DISK: ${DOCKER_FILESYSTEM_DISK:-public}
      RUN_MIGRATIONS: "false"
      RUN_SEEDERS: "false"
      CACHE_LARAVEL_CONFIG: ${DOCKER_CACHE_LARAVEL_CONFIG:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage_data:/var/www/html/storage

  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DOCKER_DB_DATABASE:-srhr}
      MARIADB_USER: ${DOCKER_DB_USERNAME:-srhr}
      MARIADB_PASSWORD: ${DOCKER_DB_PASSWORD:-secret}
      MARIADB_ROOT_PASSWORD: ${DOCKER_DB_ROOT_PASSWORD:-root-secret}
    ports:
      - "${DOCKER_DB_EXPOSE_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$$MARIADB_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${DOCKER_REDIS_EXPOSE_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  redis_data:
  storage_data:
