services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    restart: unless-stopped
    environment:
      APP_NAME: ${DOCKER_APP_NAME:-SRHR}
      APP_ENV: ${DOCKER_APP_ENV:-production}
      APP_DEBUG: ${DOCKER_APP_DEBUG:-false}
      APP_KEY: ${DOCKER_APP_KEY:-base64:6f0w1+Rj0m9V7xw+LJdF0yk4s3eh4F6o2vJ5Qf8nJPo=}
      APP_URL: ${DOCKER_APP_URL:-http://localhost}
      LOG_CHANNEL: ${DOCKER_LOG_CHANNEL:-stack}
      LOG_STACK: ${DOCKER_LOG_STACK:-stderr,single}
      LOG_LEVEL: ${DOCKER_LOG_LEVEL:-info}
      DB_CONNECTION: ${DOCKER_DB_CONNECTION:-sqlite}
      DB_DATABASE: ${DOCKER_DB_DATABASE:-/var/lib/srhr/database.sqlite}
      SESSION_DRIVER: ${DOCKER_SESSION_DRIVER:-redis}
      CACHE_STORE: ${DOCKER_CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${DOCKER_QUEUE_CONNECTION:-redis}
      REDIS_HOST: ${DOCKER_REDIS_HOST:-redis}
      REDIS_PORT: ${DOCKER_REDIS_PORT:-6379}
      FILESYSTEM_DISK: ${DOCKER_FILESYSTEM_DISK:-public}
      RUN_MIGRATIONS: ${DOCKER_RUN_MIGRATIONS:-true}
      RUN_SEEDERS: ${DOCKER_RUN_SEEDERS:-true}
      CACHE_LARAVEL_CONFIG: ${DOCKER_CACHE_LARAVEL_CONFIG:-true}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${DOCKER_WEB_PORT:-80}:80"
    volumes:
      - storage_data:/var/www/html/storage
      - sqlite_data:/var/lib/srhr
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=90"]
    environment:
      APP_NAME: ${DOCKER_APP_NAME:-SRHR}
      APP_ENV: ${DOCKER_APP_ENV:-production}
      APP_DEBUG: ${DOCKER_APP_DEBUG:-false}
      APP_KEY: ${DOCKER_APP_KEY:-base64:6f0w1+Rj0m9V7xw+LJdF0yk4s3eh4F6o2vJ5Qf8nJPo=}
      APP_URL: ${DOCKER_APP_URL:-http://localhost}
      LOG_CHANNEL: ${DOCKER_LOG_CHANNEL:-stack}
      LOG_STACK: ${DOCKER_LOG_STACK:-stderr,single}
      LOG_LEVEL: ${DOCKER_LOG_LEVEL:-info}
      DB_CONNECTION: ${DOCKER_DB_CONNECTION:-sqlite}
      DB_DATABASE: ${DOCKER_DB_DATABASE:-/var/lib/srhr/database.sqlite}
      SESSION_DRIVER: ${DOCKER_SESSION_DRIVER:-redis}
      CACHE_STORE: ${DOCKER_CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${DOCKER_QUEUE_CONNECTION:-redis}
      REDIS_HOST: ${DOCKER_REDIS_HOST:-redis}
      REDIS_PORT: ${DOCKER_REDIS_PORT:-6379}
      FILESYSTEM_DISK: ${DOCKER_FILESYSTEM_DISK:-public}
      RUN_MIGRATIONS: "false"
      RUN_SEEDERS: "false"
      CACHE_LARAVEL_CONFIG: ${DOCKER_CACHE_LARAVEL_CONFIG:-true}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - storage_data:/var/www/html/storage
      - sqlite_data:/var/lib/srhr

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    command: ["sh", "-lc", "while true; do php artisan schedule:run --no-interaction -v; sleep 60; done"]
    environment:
      APP_NAME: ${DOCKER_APP_NAME:-SRHR}
      APP_ENV: ${DOCKER_APP_ENV:-production}
      APP_DEBUG: ${DOCKER_APP_DEBUG:-false}
      APP_KEY: ${DOCKER_APP_KEY:-base64:6f0w1+Rj0m9V7xw+LJdF0yk4s3eh4F6o2vJ5Qf8nJPo=}
      APP_URL: ${DOCKER_APP_URL:-http://localhost}
      LOG_CHANNEL: ${DOCKER_LOG_CHANNEL:-stack}
      LOG_STACK: ${DOCKER_LOG_STACK:-stderr,single}
      LOG_LEVEL: ${DOCKER_LOG_LEVEL:-info}
      DB_CONNECTION: ${DOCKER_DB_CONNECTION:-sqlite}
      DB_DATABASE: ${DOCKER_DB_DATABASE:-/var/lib/srhr/database.sqlite}
      SESSION_DRIVER: ${DOCKER_SESSION_DRIVER:-redis}
      CACHE_STORE: ${DOCKER_CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${DOCKER_QUEUE_CONNECTION:-redis}
      REDIS_HOST: ${DOCKER_REDIS_HOST:-redis}
      REDIS_PORT: ${DOCKER_REDIS_PORT:-6379}
      FILESYSTEM_DISK: ${DOCKER_FILESYSTEM_DISK:-public}
      RUN_MIGRATIONS: "false"
      RUN_SEEDERS: "false"
      CACHE_LARAVEL_CONFIG: ${DOCKER_CACHE_LARAVEL_CONFIG:-true}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - storage_data:/var/www/html/storage
      - sqlite_data:/var/lib/srhr

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${DOCKER_REDIS_EXPOSE_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  redis_data:
  storage_data:
  sqlite_data:
